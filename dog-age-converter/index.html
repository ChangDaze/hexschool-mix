<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>狗狗歲數換算計算機</title>
    <!-- 使用 Tailwind CSS 進行快速且現代的網頁排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 提供可愛的 icon -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap");

      body {
        font-family: "Noto Sans TC", sans-serif;
        background-color: #fffbeb; /* 溫暖的淺黃/橘色背景 */
      }

      /* 簡單的淡入動畫 */
      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 隱藏元素用的 class */
      .hidden-area {
        display: none;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <!-- 主計算機卡片 -->
    <div
      class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100"
    >
      <!-- 卡片標頭 -->
      <div class="bg-orange-500 text-white p-6 text-center">
        <i class="fas fa-dog text-5xl mb-3"></i>
        <h1 class="text-2xl font-black tracking-wide">狗狗歲數計算機</h1>
        <p class="text-orange-100 text-sm mt-1">
          輕鬆把毛孩年齡換算成人類歲數！
        </p>
      </div>

      <!-- 輸入區域 -->
      <div class="p-6">
        <div class="space-y-5">
          <!-- 生日輸入 -->
          <div>
            <label for="dob" class="block text-gray-700 font-bold mb-2">
              <i class="fas fa-birthday-cake text-orange-400 mr-1"></i>
              狗狗的西元生日
            </label>
            <input
              type="date"
              id="dob"
              max=""
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition-colors bg-gray-50 text-gray-800"
            />
          </div>

          <!-- 體型選擇 -->
          <div>
            <label for="size" class="block text-gray-700 font-bold mb-2">
              <i class="fas fa-weight-hanging text-orange-400 mr-1"></i>
              狗狗的體型
            </label>
            <select
              id="size"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition-colors bg-gray-50 text-gray-800"
            >
              <option value="small">
                小型犬 (10公斤以下，如：貴賓、吉娃娃)
              </option>
              <option value="medium">中型犬 (10~25公斤，如：柴犬、柯基)</option>
              <option value="large">
                大型犬 (25公斤以上，如：黃金、哈士奇)
              </option>
            </select>
          </div>

          <!-- 錯誤訊息提示區 -->
          <div
            id="errorMessage"
            class="hidden-area bg-red-50 text-red-600 p-3 rounded-xl text-sm font-bold text-center border border-red-200 fade-in"
          >
            <i class="fas fa-exclamation-circle mr-1"></i>
            <span id="errorText">請輸入正確的日期！</span>
          </div>

          <!-- 計算按鈕 -->
          <button
            onclick="calculateAge()"
            class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5"
          >
            開始換算 <i class="fas fa-paw ml-1"></i>
          </button>
        </div>

        <!-- 結果顯示區域 (預設隱藏) -->
        <div
          id="resultArea"
          class="hidden-area mt-8 bg-orange-50 p-6 rounded-2xl border-2 border-orange-200 text-center fade-in"
        >
          <p class="text-gray-600 text-sm mb-1 font-bold">
            狗狗目前的實際年紀為：
          </p>
          <p class="text-xl font-bold text-orange-900 mb-5" id="actualAge">
            0 歲 0 個月
          </p>

          <div class="h-px bg-orange-200 w-3/4 mx-auto mb-5"></div>

          <p class="text-gray-600 text-sm mb-2 font-bold">換算成人類大約是：</p>
          <div class="flex items-baseline justify-center mb-2">
            <span class="text-5xl font-black text-orange-600" id="humanAge"
              >0</span
            >
            <span class="text-2xl text-orange-800 font-bold ml-1"> 歲</span>
          </div>

          <div
            class="mt-4 inline-block bg-white px-4 py-2 rounded-full shadow-sm border border-orange-100"
          >
            <span class="text-sm font-bold text-orange-500" id="lifeStage">
              <i class="fas fa-heart"></i> 幼犬期
            </span>
          </div>
        </div>

        <!-- 參考來源說明 -->
        <div class="mt-8 pt-5 border-t border-gray-200">
          <h3 class="text-sm font-black text-gray-700 mb-2 flex items-center">
            <i class="fas fa-book text-orange-400 mr-2"></i> 計算公式來源
          </h3>
          <p class="text-xs text-gray-500 leading-relaxed mb-3">
            採用台灣常見且容易理解的「體型換算法」，免去複雜的高等數學對數(ln)運算：
          </p>
          <ul
            class="text-xs text-gray-500 list-none space-y-1 mb-4 bg-gray-50 p-3 rounded-lg"
          >
            <li>
              <i class="fas fa-check text-orange-400 mr-1"></i> 第 1 年 ＝ 人類
              15 歲
            </li>
            <li>
              <i class="fas fa-check text-orange-400 mr-1"></i> 第 2 年 ＝ 人類
              24 歲
            </li>
            <li>
              <i class="fas fa-check text-orange-400 mr-1"></i> 第 3
              年起：小型犬每年 +4歲、中型犬 +5歲、大型犬 +6歲
            </li>
          </ul>
          <a
            href="https://www.doggywants.com.tw/Article/Detail/100801"
            target="_blank"
            class="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center transition-colors"
          >
            <i class="fas fa-external-link-alt mr-1"></i> 參考資料：汪事如意 -
            狗狗年齡換算表
          </a>
        </div>
      </div>
    </div>

    <script>
      // 設定生日選擇器的最大值為今天（不能選未來）
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      document.getElementById("dob").setAttribute("max", `${yyyy}-${mm}-${dd}`);

      function calculateAge() {
        const dobInput = document.getElementById("dob").value;
        const size = document.getElementById("size").value;
        const errorArea = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        const resultArea = document.getElementById("resultArea");

        // 檢查是否輸入日期
        if (!dobInput) {
          showError("請先選擇狗狗的生日唷！");
          return;
        }

        const dob = new Date(dobInput);
        const currentDate = new Date();

        // 檢查是否為未來日期
        if (dob > currentDate) {
          showError("生日不能選擇未來的日期唷！");
          return;
        }

        // 隱藏錯誤訊息
        errorArea.classList.add("hidden-area");

        // 計算精確的月數差異
        let months = (currentDate.getFullYear() - dob.getFullYear()) * 12;
        months -= dob.getMonth();
        months += currentDate.getMonth();

        // 處理日期的偏差 (如果今天的日期還沒到狗狗出生的日期，則月數減一)
        if (currentDate.getDate() < dob.getDate()) {
          months--;
        }

        // 防呆機制：如果剛出生不到一個月
        if (months < 0) months = 0;

        const totalYears = months / 12;
        const actualYears = Math.floor(totalYears);
        const actualMonths = months % 12;

        // 計算人類年齡 (採用平滑的月份比例計算，比死板的階梯式更準確)
        let humanAge = 0;

        if (totalYears <= 1) {
          // 0~1歲: 按比例成長到15歲
          humanAge = totalYears * 15;
        } else if (totalYears <= 2) {
          // 1~2歲: 從15歲成長到24歲 (一年增加9歲)
          humanAge = 15 + (totalYears - 1) * 9;
        } else {
          // 2歲以上: 基礎24歲 + 根據體型增加
          let yearlyRate = 4; // 預設小型犬
          if (size === "medium") yearlyRate = 5;
          if (size === "large") yearlyRate = 6;

          humanAge = 24 + (totalYears - 2) * yearlyRate;
        }

        // 更新 UI 顯示 (四捨五入到小數點後一位)
        const displayHumanAge = (Math.round(humanAge * 10) / 10).toFixed(1);

        // 決定生命階段提示文字
        let lifeStageText = "";
        let lifeStageIcon = "";
        if (humanAge < 12) {
          lifeStageText = "可愛童年期";
          lifeStageIcon = "fa-baby";
        } else if (humanAge < 18) {
          lifeStageText = "青春期 / 轉大人";
          lifeStageIcon = "fa-star";
        } else if (humanAge < 40) {
          lifeStageText = "活力青壯年";
          lifeStageIcon = "fa-fire";
        } else if (humanAge < 60) {
          lifeStageText = "穩重中年期";
          lifeStageIcon = "fa-mug-hot";
        } else {
          lifeStageText = "熟齡長青期 (要多注意保養喔！)";
          lifeStageIcon = "fa-heartbeat";
        }

        // 渲染結果到畫面上
        document.getElementById("actualAge").innerText =
          `${actualYears} 歲 ${actualMonths} 個月`;
        // 如果小數點後是 .0，就把它去掉，畫面更乾淨
        document.getElementById("humanAge").innerText =
          displayHumanAge.endsWith(".0")
            ? displayHumanAge.slice(0, -2)
            : displayHumanAge;
        document.getElementById("lifeStage").innerHTML =
          `<i class="fas ${lifeStageIcon} mr-1"></i> ${lifeStageText}`;

        // 顯示結果區塊 (重新觸發動畫)
        resultArea.classList.remove("hidden-area");
        resultArea.classList.remove("fade-in");
        void resultArea.offsetWidth; // 觸發 reflow 以重置動畫
        resultArea.classList.add("fade-in");
      }

      function showError(msg) {
        document.getElementById("errorText").innerText = msg;
        document.getElementById("errorMessage").classList.remove("hidden-area");
        document.getElementById("resultArea").classList.add("hidden-area");
      }
    </script>
  </body>
</html>
